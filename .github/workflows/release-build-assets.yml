name: release-build-assets

on:
  release:
    types:
      - published

concurrency:
  group: release-build-assets-${{ github.event.release.tag_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve version from release tag
        shell: bash
        run: |
          set -euo pipefail
          RAW_TAG="${{ github.event.release.tag_name }}"
          if [[ -z "${RAW_TAG}" ]]; then
            echo "release tag_name is empty"
            exit 1
          fi
          VERSION="${RAW_TAG#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid semver tag: ${RAW_TAG}"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "ASSET_NAME=cshell-${VERSION}.tar.gz" >> "${GITHUB_ENV}"

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-standalone-scripts.sh
          scripts/build-standalone-scripts.sh
          tar -czf "dist/${ASSET_NAME}" -C dist cshell
          (cd dist && sha256sum "${ASSET_NAME}") >"dist/${ASSET_NAME}.sha256"
          cp dist/install.sh "dist/install-${VERSION}.sh"
          (cd dist && sha256sum "install-${VERSION}.sh") >"dist/install-${VERSION}.sh.sha256"

      - name: Upload archive to GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/${{ env.ASSET_NAME }}
            dist/${{ env.ASSET_NAME }}.sha256
            dist/install-${{ env.VERSION }}.sh
            dist/install-${{ env.VERSION }}.sh.sha256
