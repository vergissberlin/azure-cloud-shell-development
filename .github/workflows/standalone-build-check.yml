name: standalone-build-check

on:
  pull_request:
    paths:
      - ".devcontainer/**"
      - "cshell"
      - "install.sh"
      - "lib/**"
      - "scripts/misc-cli-utils.sh"
      - "scripts/build-standalone-scripts.sh"
      - "scripts/e2e-devcontainer-install.sh"
      - "tests/**"
      - ".github/workflows/standalone-build-check.yml"
      - ".github/workflows/release-build-assets.yml"
      - ".github/workflows/devcontainer-install-e2e.yml"
  push:
    branches:
      - main
    paths:
      - ".devcontainer/**"
      - "cshell"
      - "install.sh"
      - "lib/**"
      - "scripts/misc-cli-utils.sh"
      - "scripts/build-standalone-scripts.sh"
      - "scripts/e2e-devcontainer-install.sh"
      - "tests/**"
      - ".github/workflows/standalone-build-check.yml"
      - ".github/workflows/release-build-assets.yml"
      - ".github/workflows/devcontainer-install-e2e.yml"
  workflow_dispatch:

concurrency:
  group: standalone-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build standalone scripts
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-standalone-scripts.sh
          scripts/build-standalone-scripts.sh

      - name: Validate shell syntax
        shell: bash
        run: |
          set -euo pipefail
          bash -n cshell install.sh scripts/build-standalone-scripts.sh scripts/e2e-devcontainer-install.sh
          bash -n lib/env-file.sh lib/portable.sh lib/config-cmd.sh lib/hybrid-checklist.sh lib/hybrid-command-log.sh lib/hybrid-aks-kubeconfig.sh lib/hybrid-overrides-nonprod.sh lib/hybrid-overrides-prod.sh
          bash -n dist/cshell dist/install.sh

  shell-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install linters
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: shellcheck
        shell: bash
        run: |
          set -euo pipefail
          shellcheck -x cshell install.sh scripts/build-standalone-scripts.sh scripts/e2e-devcontainer-install.sh lib/*.sh

      - name: shfmt (check only)
        shell: bash
        run: |
          set -euo pipefail
          shfmt -d -ci -bn cshell install.sh lib/*.sh scripts/build-standalone-scripts.sh scripts/e2e-devcontainer-install.sh

  bats-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Bats
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/bats-core/bats-core.git "${RUNNER_TEMP}/bats-core"

      - name: Run Bats
        shell: bash
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/bats-core/bin/bats" tests
